baseURL = "https://blog.ugurelveren.com"
defaultContentLanguage = "en"
languageCode = "en-us"
title = "Ugur's Personal Documentation"
theme = "expresslane"
author = "Ugur Elveren"

[markup.goldmark.renderer]
  unsafe = true

[Params]
  post_meta = ["author", "date", "categories", "translations"]

[Params.sidebar]
  home = "right"
  list = "right"
  single = "right"
  widgets = ["search", "recent", "categories", "taglist", "social"]

[Params.widgets.search]
  url = "https://duckduckgo.com/"
  [Params.widgets.search.input]
    name = "sites"
    pre = ""

[Params.widgets.social]
  github = "ugurelveren"
  mastodon = "https://hachyderm.io/@ugur"

[[Params.widgets.social.custom]]
  title = "Home Page"
  url = "https://ugurelveren.com"
  rel = "me"

[Languages]
  [Languages.en]
    languageName = "English"
    weight = 1
    contentDir = "content"
    title = "Ugur's Personal Documentation"
    languageCode = "en-us"
  [Languages.tr]
    languageName = "Türkçe"
    weight = 2
    contentDir = "content-tr"
    title = "Ugur'un Kişisel Dokümantasyonu"
    languageCode = "tr-tr"

# English Menus
[Languages.en.menu]
  [[Languages.en.menu.main]]
    name = "Home"
    url = "/"
    weight = 10
  [[Languages.en.menu.main]]
    name = "Everyday"
    url = "/categories/personal"
    weight = 20

    [[Languages.en.menu.main]]
      name = "Bucket List"
      url = "/categories/bucket-list"
      weight = 1
      parent = "Everyday"
  [[Languages.en.menu.main]]
    name = "Dev"
    url = "/categories/technical"
    weight = 30

    [[Languages.en.menu.main]]
      name = "Kubernetes"
      url = "/categories/kubernetes"
      weight = 1
      parent = "Dev"

    [[Languages.en.menu.main]]
      name = "Cloud"
      url = "/categories/cloud"
      weight = 2
      parent = "Dev"

      [[Languages.en.menu.main]]
        name = "Design patterns"
        url = "/categories/cloud-design-patterns"
        parent = "Cloud"

    [[Languages.en.menu.main]]
      name = "SRE"
      url = "/categories/sre"
      weight = 3
      parent = "Dev"

  [[Languages.en.menu.main]]
    name = "Photos"
    pre = '<i class="fa fa-heart"></i>'
    url = "https://photos.ugurelveren.com"
    weight = 60
    [Languages.en.menu.main.params]
      rel = "external"
      class = "right"
  [[Languages.en.menu.main]]
    name = "Books"
    url = "/books"
    weight = 40

